name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: VaultBox v__VERSION__
          releaseBody: |
            A desktop app for browsing gocryptfs-encrypted vaults without mounting them. All decryption happens in-process with zero plaintext on disk.

            ## Features

            - **Vault management** — Open, create, and lock gocryptfs v2 vaults with secure password handling
            - **File operations** — Browse, create, rename, delete, search, import, and export encrypted files
            - **Text editor** — CodeMirror 6 with syntax highlighting for 11+ languages
            - **Image viewer** — Blob-rendered previews with fullscreen mode
            - **Media player** — Streaming video/audio via custom `vaultmedia://` protocol with HTTP Range support for seeking
            - **Hex viewer** — Binary file inspection with offset/hex/ASCII display
            - **Clipboard** — Copy decrypted content with auto-clear after timeout
            - **Streaming decryption** — On-demand block decryption for large files (>10 MB) without loading into RAM
            - **Security** — mlock'd XOR-masked keys, zeroized memory, auto-lock after inactivity, no unsafe-eval CSP

            ## Platforms

            | Platform | Architecture | Format |
            |----------|-------------|--------|
            | Linux | x86_64 | .deb, .AppImage |
            | macOS | Apple Silicon | .dmg |
            | macOS | Intel | .dmg |
            | Windows | x86_64 | .msi, .exe |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
