name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: VaultBox v__VERSION__
          releaseBody: |
            A desktop app for browsing gocryptfs-encrypted vaults without mounting them. All decryption happens in-process with zero plaintext on disk.

            ## What's New in v1.2.0

            ### Viewers
            - **PDF viewer** — Render PDFs with pdfjs-dist: zoom, fit-width/fit-page, page navigation, scroll tracking, Ctrl+wheel zoom
            - **Archive viewer** — Browse .zip contents with tree view, file sizes, dates. Extract individual files to vault or disk, or extract all at once
            - **Markdown preview** — Live split-view rendered preview for .md files with toggle button
            - **Split view** — Side-by-side file comparison: click the split button, then Alt+click a tab to open in the right pane

            ### UI Improvements
            - **File type icons** — Unique colored SVG icons for code, config, markup, audio, archive, shell, PDF, and text files
            - **Image gallery** — Thumbnail strip in fullscreen viewer with auto-scroll, Home/End key navigation
            - **Tab reorder** — Drag tabs to rearrange (pointer-based, no conflict with OS drag-drop)
            - **Batch operations** — Multi-select files for Export All, Copy All, Delete All
            - **Move to folder** — Right-click context menu with flyout submenu listing target folders
            - **File info panel** — Right sidebar with file details (Cmd+I to toggle)
            - **Confirm dialogs** — Custom modal dialogs replacing browser confirm/alert
            - **Password strength** — Visual strength meter when creating a new vault

            ### Keyboard Shortcuts
            - **Cmd+N** — Instantly create untitled.txt in current directory
            - **Cmd+Shift+N** — Open new folder dialog

            ### Bug Fixes & Polish
            - File tree updates on folder create/delete without losing expanded state
            - Open tabs auto-close when their file is deleted
            - Table layout stays compact when viewer panel is open
            - Duplicate Tauri drop events no longer cause import errors
            - XSS hardened: markdown links restricted to http/https/mailto only
            - Windows build: added windows-sys dependency for VirtualLock/VirtualUnlock

            ### Security
            - All vault content rendered as text (CodeMirror) or via `<img>` tags — no script execution
            - SVG scripts blocked (rendered in `<img>`, not `<iframe>`)
            - Markdown `javascript:` protocol links stripped
            - PDF.js does not execute embedded JavaScript
            - Zero plaintext on disk, mlock'd keys, auto-lock, zeroized memory on lock

            ## Platforms

            | Platform | Architecture | Format |
            |----------|-------------|--------|
            | Linux | x86_64 | .deb, .AppImage |
            | macOS | Apple Silicon | .dmg |
            | macOS | Intel | .dmg |
            | Windows | x86_64 | .msi, .exe |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
